<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>História de Portugal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: url('assets/img/pergaminho.jpg') repeat center center fixed, #f7f2e7;
      background-size: cover;
    }
    .idioma {
      margin-top: 3rem;
      display: flex;
      gap: 2rem;
    }
    .idioma-btn {
      font-size: 2rem;
      padding: 1.2rem 2.5rem;
      border-radius: 15px;
      background: #e9e4d1;
      color: #1a365d;
      border: 2px solid #1a365d;
      text-decoration: none;
      font-weight: bold;
      transition: 0.2s;
      box-shadow: 0 4px 10px #1a365d22;
    }
    .idioma-btn:hover {
      background: #ffcc49;
      color: #1a365d;
      transform: scale(1.08);
    }
    .logo-titulo {
      margin-top: 2rem;
      font-size: 2.7rem;
      color: #1a365d;
      font-weight: bold;
      text-shadow: 1px 1px 0 #ffcc4970;
      letter-spacing: 2px;
      text-align: center;
    }
    .slogan {
      font-size: 1.3rem;
      margin-top: 1rem;
      color: #1a365d;
      text-align: center;
      max-width: 430px;
    }
  </style>
</head>
<body>
  <div class="logo-titulo">História de Portugal</div>
  <div class="slogan">
    Bem-vindo! Escolhe o idioma para explorar séculos de aventuras, reis, navegadores e curiosidades de Portugal.<br>
    <em>Welcome! Choose your language to explore centuries of adventure, kings, explorers and curiosities of Portugal.</em>
  </div>
  <div class="idioma">
    <a class="idioma-btn" href="pt/index.html">🇵🇹 Português</a>
    <a class="idioma-btn" href="en/index.html">🇬🇧 English</a>
  </div>
</body>
</html>
